</head>

                </div>
                <div class="chip-hover flex items-center bg-m3-light-bg dark:bg-m3-dark-bg px-4 py-2 rounded-full shadow-sm border border-m3-light-outline/20 dark:border-m3-dark-outline/20">

                <div class="chip-hover flex items-center bg-m3-light-bg dark:bg-m3-dark-bg px-4 py-2 rounded-full shadow-sm border border-m3-light-outline/20 dark:border-m3-dark-outline/20">
                    <div class="w-4 h-0 border-t-2 border-m3-light-onSurface dark:border-m3-dark-onSurface border-dashed mr-2"></div><span class="font-medium text-sm">Trendline</span>

    </div>

    <script>
        // --- 0. Theme Toggle Logic ---
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        
        // SVG Icons
        const moonIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>`;
        const sunIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>`;

        // Initialize correct icon on load based on class="dark" in HTML
        const initialDark = document.documentElement.classList.contains('dark');
        themeIcon.innerHTML = initialDark ? sunIcon : moonIcon;

        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            
            themeIcon.innerHTML = isDark ? sunIcon : moonIcon;
            
            if(window.gdpChartInstance) {
                applyChartTheme(window.gdpChartInstance);
            }
        });

        // Global state for current Era calculation
        let currentEra = 1991;

        // 1. Core Data State
        const dataState = {
            years: [],
            upGdp: [], mhGdp: [], tnGdp: [], indiaGdp: [],
            upTrend: [], mhTrend: [], tnTrend: [], indiaTrend: []
        };

        // Initialize and calculate all static baseline data
        function initializeData() {
            const upMap = {
                2011: 7.24, 2012: 8.22, 2013: 9.44, 2014: 10.11, 2015: 11.53, 
                2016: 13.30, 2017: 14.39, 2018: 15.82, 2019: 17.00, 2020: 16.41, 
                2021: 19.16, 2022: 20.50, 2023: 22.58, 2024: 25.48, 2025: 30.25, 2026: 36.00
            };
            const mhMap = {
                2011: 12.80, 2012: 14.48, 2013: 16.50, 2014: 17.92, 2015: 19.66, 
                2016: 21.88, 2017: 24.11, 2018: 26.60, 2019: 28.18, 2020: 27.12, 
                2021: 31.08, 2022: 35.27, 2023: 38.79, 2024: 42.67, 2025: 47.00, 2026: 51.00
            };
            const tnMap = {
                2011: 7.51, 2012: 8.55, 2013: 9.71, 2014: 10.93, 2015: 12.13, 
                2016: 13.38, 2017: 14.65, 2018: 16.30, 2019: 17.97, 2020: 18.45, 
                2021: 21.24, 2022: 23.65, 2023: 26.00, 2024: 28.30, 2025: 31.50, 2026: 35.00
            };
            const indiaMap = {
                2011: 87.36, 2012: 99.44, 2013: 105.36, 2014: 112.33, 2015: 125.41, 
                2016: 139.52, 2017: 153.62, 2018: 170.90, 2019: 200.74, 2020: 198.00, 
                2021: 236.64, 2022: 273.07, 2023: 295.36, 2024: 327.71, 2025: 360.00, 2026: 390.00
            };

            for (let year = 2010; year >= 1947; year--) {
                let indGrowth = 1.11; 
                if (year < 2010 && year >= 2000) indGrowth = 1.12;
                if (year < 2000 && year >= 1990) indGrowth = 1.14;
                if (year < 1990 && year >= 1980) indGrowth = 1.13;
                if (year < 1980 && year >= 1970) indGrowth = 1.09;
                if (year < 1970 && year >= 1960) indGrowth = 1.08;
                if (year < 1960) indGrowth = 1.06;
                
                if (year === 1990) indGrowth = 1.02; 
                if (year === 2007) indGrowth = 1.05; 
                
                indiaMap[year] = indiaMap[year + 1] / indGrowth;

                upMap[year] = indiaMap[year] * (0.08287 + ((2011 - year) * 0.000345));
                mhMap[year] = indiaMap[year] * (0.1465 - ((2011 - year) * 0.0001));
                tnMap[year] = indiaMap[year] * (0.0860 - ((2011 - year) * 0.0002));
            }

            for (let year = 1947; year <= 2026; year++) {
                dataState.years.push(String(year));
                dataState.upGdp.push(parseFloat(upMap[year].toFixed(4))); 
                dataState.mhGdp.push(parseFloat(mhMap[year].toFixed(4))); 
                dataState.tnGdp.push(parseFloat(tnMap[year].toFixed(4))); 
                dataState.indiaGdp.push(parseFloat(indiaMap[year].toFixed(3)));
            }
        }

        // Calculate Exponential Line of Best Fit (Least Squares Regression)
        function calculateBestFitTrendlines(startYear) {
            const startIndex = dataState.years.indexOf(String(startYear));
            if (startIndex === -1) return;

            const makeTrend = (dataArray) => {
                let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
                let count = 0;

                for (let i = startIndex; i < dataArray.length; i++) {
                    let x = i - startIndex; 
                    let y = Math.log(dataArray[i]); 
                    sumX += x;
                    sumY += y;
                    sumXY += x * y;
                    sumXX += x * x;
                    count++;
                }

                let m = (count * sumXY - sumX * sumY) / (count * sumXX - sumX * sumX);
                let c = (sumY - m * sumX) / count;
                let A = Math.exp(c);

                return dataArray.map((_, i) => {
                    if (i < startIndex) return null;
                    let x = i - startIndex;
                    return parseFloat((A * Math.exp(m * x)).toFixed(4));
                });
            };

            dataState.indiaTrend.length = 0; dataState.indiaTrend.push(...makeTrend(dataState.indiaGdp));
            dataState.mhTrend.length = 0; dataState.mhTrend.push(...makeTrend(dataState.mhGdp));
            dataState.tnTrend.length = 0; dataState.tnTrend.push(...makeTrend(dataState.tnGdp));
            dataState.upTrend.length = 0; dataState.upTrend.push(...makeTrend(dataState.upGdp));
        }

        // 2. Political History Helpers
        function getPartyInfo(year) {
            const y = parseInt(year);
            if (y >= 2017) return { name: 'BJP', color: '#F97316', cm: 'Yogi Adityanath' };
            if (y >= 2012) return { name: 'Samajwadi Party', color: '#DC2626', cm: 'Akhilesh Yadav' };
            if (y >= 2007) return { name: 'BSP', color: '#1E3A8A', cm: 'Mayawati' };
            if (y >= 2003) return { name: 'Samajwadi Party', color: '#DC2626', cm: 'Mulayam Singh Yadav' };
            if (y === 2002) return { name: 'BSP', color: '#1E3A8A', cm: 'Mayawati' };
            if (y >= 2000) return { name: 'BJP', color: '#F97316', cm: 'Rajnath Singh' };
            if (y === 1999) return { name: 'BJP', color: '#F97316', cm: 'Ram Prakash Gupta' };
            if (y >= 1997) return { name: 'BJP', color: '#F97316', cm: 'Kalyan Singh' };
            if (y === 1996) return { name: "President's Rule", color: '#9CA3AF', cm: "Governor's Rule" };
            if (y === 1995) return { name: 'BSP', color: '#1E3A8A', cm: 'Mayawati' };
            if (y === 1994) return { name: 'Samajwadi Party', color: '#DC2626', cm: 'Mulayam Singh Yadav' };
            if (y === 1993) return { name: "President's Rule", color: '#9CA3AF', cm: "Governor's Rule" };
            if (y >= 1991) return { name: 'BJP', color: '#F97316', cm: 'Kalyan Singh' };
            if (y === 1990) return { name: 'Janata Dal', color: '#16A34A', cm: 'Mulayam Singh Yadav' };
            if (y >= 1988) return { name: 'Congress', color: '#2563EB', cm: 'N. D. Tiwari' };
            if (y >= 1985) return { name: 'Congress', color: '#2563EB', cm: 'Vir Bahadur Singh' };
            if (y >= 1982) return { name: 'Congress', color: '#2563EB', cm: 'Sripati Mishra' };
            if (y >= 1980) return { name: 'Congress', color: '#2563EB', cm: 'V. P. Singh' };
            if (y === 1979) return { name: 'Janata Party', color: '#16A34A', cm: 'Banarsi Das' };
            if (y >= 1977) return { name: 'Janata Party', color: '#16A34A', cm: 'Ram Naresh Yadav' };
            if (y === 1976) return { name: 'Congress', color: '#2563EB', cm: 'N. D. Tiwari' };
            if (y >= 1974) return { name: 'Congress', color: '#2563EB', cm: 'H. N. Bahuguna' };
            if (y >= 1971) return { name: 'Congress', color: '#2563EB', cm: 'Kamlapati Tripathi' };
            if (y === 1970) return { name: 'BKD', color: '#16A34A', cm: 'Charan Singh' };
            if (y === 1969) return { name: 'Congress', color: '#2563EB', cm: 'C. B. Gupta' };
            if (y === 1967) return { name: 'BKD', color: '#16A34A', cm: 'Charan Singh' };
            if (y >= 1960) return { name: 'Congress', color: '#2563EB', cm: 'C. B. Gupta' };
            return { name: 'Congress', color: '#2563EB', cm: 'Govind Ballabh Pant / Sampurnanand' };
        }

        function getMhPartyInfo(year) {
            const y = parseInt(year);
            if (y >= 2022) return { name: 'Mahayuti (NDA)', color: '#F97316', cm: 'Eknath Shinde' };
            if (y >= 2019) return { name: 'MVA', color: '#10B981', cm: 'Uddhav Thackeray' };
            if (y >= 2014) return { name: 'BJP / NDA', color: '#F97316', cm: 'Devendra Fadnavis' };
            if (y >= 1999) return { name: 'Congress / NCP', color: '#2563EB', cm: 'Deshmukh / Chavan / Pawar' };
            if (y >= 1995) return { name: 'Shiv Sena / BJP', color: '#F97316', cm: 'Manohar Joshi / Narayan Rane' };
            if (y >= 1978) return { name: 'Congress', color: '#2563EB', cm: 'Pawar / Antulay / Bhosale' };
            if (y >= 1960) return { name: 'Congress', color: '#2563EB', cm: 'Chavan / Naik' };
            return { name: 'Congress (Bombay State)', color: '#2563EB', cm: 'B. G. Kher / Morarji Desai' };
        }

        function getTnPartyInfo(year) {
            const y = parseInt(year);
            if (y >= 2021) return { name: 'DMK', color: '#DC2626', cm: 'M. K. Stalin' };
            if (y >= 2011) return { name: 'AIADMK', color: '#16A34A', cm: 'Jayalalithaa / EPS / OPS' };
            if (y >= 2006) return { name: 'DMK', color: '#DC2626', cm: 'M. Karunanidhi' };
            if (y >= 2001) return { name: 'AIADMK', color: '#16A34A', cm: 'J. Jayalalithaa / OPS' };
            if (y >= 1996) return { name: 'DMK', color: '#DC2626', cm: 'M. Karunanidhi' };
            if (y >= 1991) return { name: 'AIADMK', color: '#16A34A', cm: 'J. Jayalalithaa' };
            if (y >= 1989) return { name: 'DMK', color: '#DC2626', cm: 'M. Karunanidhi' };
            if (y >= 1977) return { name: 'AIADMK', color: '#16A34A', cm: 'M. G. Ramachandran' };
            if (y >= 1969) return { name: 'DMK', color: '#DC2626', cm: 'M. Karunanidhi' };
            if (y >= 1967) return { name: 'DMK', color: '#DC2626', cm: 'C. N. Annadurai' };
            if (y >= 1954) return { name: 'Congress', color: '#2563EB', cm: 'K. Kamaraj' };
            return { name: 'Congress', color: '#2563EB', cm: 'O. P. Ramaswamy / C. R. / Bhaktavatsalam' };
        }

        function getIndiaPartyInfo(year) {
            const y = parseInt(year);
            if (y >= 2014) return { name: 'NDA (BJP)', color: '#F97316', pm: 'Narendra Modi' };
            if (y >= 2004) return { name: 'UPA (Congress)', color: '#2563EB', pm: 'Manmohan Singh' };
            if (y >= 1998) return { name: 'NDA (BJP)', color: '#F97316', pm: 'Atal Bihari Vajpayee' };
            if (y >= 1996) return { name: 'United Front', color: '#16A34A', pm: 'Deve Gowda / I.K. Gujral' };
            if (y >= 1991) return { name: 'Congress', color: '#2563EB', pm: 'P. V. Narasimha Rao' };
            if (y === 1990) return { name: 'SJP / JD', color: '#16A34A', pm: 'Chandra Shekhar' };
            if (y === 1989) return { name: 'National Front', color: '#16A34A', pm: 'V. P. Singh' };
            if (y >= 1984) return { name: 'Congress', color: '#2563EB', pm: 'Rajiv Gandhi' };
            if (y >= 1980) return { name: 'Congress', color: '#2563EB', pm: 'Indira Gandhi' };
            if (y >= 1977) return { name: 'Janata Party', color: '#16A34A', pm: 'Morarji Desai / Charan Singh' };
            if (y >= 1966) return { name: 'Congress', color: '#2563EB', pm: 'Indira Gandhi' };
            if (y >= 1964) return { name: 'Congress', color: '#2563EB', pm: 'Lal Bahadur Shastri' };
            return { name: 'Congress', color: '#2563EB', pm: 'Jawaharlal Nehru' };
        }

        // 3. Theme Configuration logic (M3 Adjustments)
        function applyChartTheme(chartInstance) {
            if(!chartInstance) return;
            const isDark = document.documentElement.classList.contains('dark');
            
            // M3 Expressive Tokens mapped to Chart
            const textColor = isDark ? '#cac4d0' : '#49454f'; // on-surface-variant
            const gridColor = isDark ? '#49454f' : '#e7e0ec'; // surface-variant
            const trendlineColor = isDark ? 'rgba(230, 224, 233, 0.7)' : 'rgba(29, 27, 32, 0.7)'; // subtle on-surface contrast
            
            chartInstance.options.scales.x.title.color = textColor;
            chartInstance.options.scales.x.ticks.color = textColor;
            
            chartInstance.options.scales.y.title.color = textColor;
            chartInstance.options.scales.y.ticks.color = textColor;
            chartInstance.options.scales.y.grid.color = gridColor;

            // Apply contrasting color to all trendline datasets
            chartInstance.data.datasets.forEach(dataset => {
                if (dataset.label.includes('Trendline')) {
                    dataset.borderColor = trendlineColor;
                }
            });

            chartInstance.update();
        }

        // 4. Main Initialization
        function initApp() {
            // First, prep the arrays
            initializeData();
            calculateBestFitTrendlines(currentEra);

            const ctx = document.getElementById('gdpChart').getContext('2d');
            let isLogScale = false;

            // Build Chart
            window.gdpChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dataState.years,
                    datasets: [
                        {
                            label: 'India Nominal GDP',
                            data: dataState.indiaGdp,
                            hidden: true,
                            order: 1, 
                            borderWidth: 4,
                            pointRadius: 0,
                            pointHoverRadius: 8,
                            pointHoverBorderWidth: 3,
                            fill: false,
                            tension: 0.3,
                            clip: false,
                            segment: {
                                borderColor: ctx => {
                                    if (ctx.p0DataIndex === undefined) return '#000';
                                    return getIndiaPartyInfo(dataState.years[ctx.p0DataIndex]).color;
                                }
                            },
                            pointBackgroundColor: ctx => getIndiaPartyInfo(dataState.years[ctx.dataIndex]).color,
                            pointBorderColor: '#ffffff'
                        },
                        {
                            label: 'Maharashtra Nominal GDP',
                            data: dataState.mhGdp,
                            hidden: true,
                            order: 1,
                            borderWidth: 4,
                            pointRadius: 0,
                            pointHoverRadius: 8,
                            pointHoverBorderWidth: 3,
                            fill: false,
                            tension: 0.3,
                            clip: false,
                            segment: {
                                borderColor: ctx => {
                                    if (ctx.p0DataIndex === undefined) return '#000';
                                    return getMhPartyInfo(dataState.years[ctx.p0DataIndex]).color;
                                }
                            },
                            pointBackgroundColor: ctx => getMhPartyInfo(dataState.years[ctx.dataIndex]).color,
                            pointBorderColor: '#ffffff'
                        },
                        {
                            label: 'Tamil Nadu Nominal GDP',
                            data: dataState.tnGdp,
                            hidden: true,
                            order: 1,
                            borderWidth: 4,
                            pointRadius: 0,
                            pointHoverRadius: 8,
                            pointHoverBorderWidth: 3,
                            fill: false,
                            tension: 0.3,
                            clip: false,
                            segment: {
                                borderColor: ctx => {
                                    if (ctx.p0DataIndex === undefined) return '#000';
                                    return getTnPartyInfo(dataState.years[ctx.p0DataIndex]).color;
                                }
                            },
                            pointBackgroundColor: ctx => getTnPartyInfo(dataState.years[ctx.dataIndex]).color,
                            pointBorderColor: '#ffffff'
                        },
                        {
                            label: 'UP Nominal GDP',
                            data: dataState.upGdp,
                            order: 1,
                            borderWidth: 4,
                            pointRadius: 0,
                            pointHoverRadius: 8,
                            pointHoverBorderWidth: 3,
                            fill: false,
                            tension: 0.3,
                            clip: false,
                            segment: {
                                borderColor: ctx => {
                                    if (ctx.p0DataIndex === undefined) return '#000';
                                    return getPartyInfo(dataState.years[ctx.p0DataIndex]).color;
                                }
                            },
                            pointBackgroundColor: ctx => getPartyInfo(dataState.years[ctx.dataIndex]).color,
                            pointBorderColor: '#ffffff'
                        },
                        // Trendline Datasets
                        {
                            label: 'India Trendline',
                            data: dataState.indiaTrend,
                            hidden: true,
                            order: 0, 
                            borderWidth: 1.5,
                            borderDash: [5, 5],
                            pointRadius: 0,
                            pointHoverRadius: 0,
                            fill: false,
                            borderColor: 'rgba(230, 224, 233, 0.7)', 
                            tension: 0
                        },
                        {
                            label: 'MH Trendline',
                            data: dataState.mhTrend,
                            hidden: true,
                            order: 0,
                            borderWidth: 1.5,
                            borderDash: [5, 5],
                            pointRadius: 0,
                            pointHoverRadius: 0,
                            fill: false,
                            borderColor: 'rgba(230, 224, 233, 0.7)',
                            tension: 0
                        },
                        {
                            label: 'TN Trendline',
                            data: dataState.tnTrend,
                            hidden: true,
                            order: 0,
                            borderWidth: 1.5,
                            borderDash: [5, 5],
                            pointRadius: 0,
                            pointHoverRadius: 0,
                            fill: false,
                            borderColor: 'rgba(230, 224, 233, 0.7)',
                            tension: 0
                        },
                        {
                            label: 'UP Trendline',
                            data: dataState.upTrend,
                            hidden: false,
                            order: 0,
                            borderWidth: 1.5,
                            borderDash: [5, 5],
                            pointRadius: 0,
                            pointHoverRadius: 0,
                            fill: false,
                            borderColor: 'rgba(230, 224, 233, 0.7)',
                            tension: 0
                        }
                    ]
                },
                options: {
                    events: ['mousemove', 'mouseout', 'click', 'touchstart', 'touchmove'], 
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            filter: function(tooltipItem) {
                                return !tooltipItem.dataset.label.includes('Trendline');
                            },
                            backgroundColor: '#313033', // M3 universal dark tooltip
                            titleColor: '#f4eff4',
                            bodyColor: '#f4eff4',
                            titleFont: { size: 14, family: 'Outfit', weight: '600' },
                            bodyFont: { size: 14, family: 'Outfit' },
                            padding: 16,
                            cornerRadius: 12,
                            callbacks: {
                                title: function(context) {
                                    return `Year: ${context[0].label}`;
                                },
                                label: function(context) {
                                    const year = context.label;
                                    const dsLabel = context.dataset.label;
                                    
                                    if (dsLabel.includes('Trendline')) {
                                        return `📈 Expected (Best Fit): ₹${context.raw} LC`;
                                    }

                                    let partyInfo, prefix, role;
                                    if (dsLabel === 'India Nominal GDP') {
                                        partyInfo = getIndiaPartyInfo(year);
                                        prefix = 'India'; role = 'PM';
                                    } else if (dsLabel === 'Maharashtra Nominal GDP') {
                                        partyInfo = getMhPartyInfo(year);
                                        prefix = 'MH'; role = 'CM';
                                    } else if (dsLabel === 'Tamil Nadu Nominal GDP') {
                                        partyInfo = getTnPartyInfo(year);
                                        prefix = 'TN'; role = 'CM';
                                    } else {
                                        partyInfo = getPartyInfo(year);
                                        prefix = 'UP'; role = 'CM';
                                    }
                                    
                                    return [
                                        `${prefix} GDP: ₹${context.raw} Lakh Cr`,
                                        `Party: ${partyInfo.name}`,
                                        `${role}: ${partyInfo.pm || partyInfo.cm}`
                                    ];
                                },
                                labelColor: function(context) {
                                    const dsLabel = context.dataset.label;
                                    let partyInfo;
                                    if (dsLabel === 'India Nominal GDP') partyInfo = getIndiaPartyInfo(context.label);
                                    else if (dsLabel === 'Maharashtra Nominal GDP') partyInfo = getMhPartyInfo(context.label);
                                    else if (dsLabel === 'Tamil Nadu Nominal GDP') partyInfo = getTnPartyInfo(context.label);
                                    else partyInfo = getPartyInfo(context.label);
                                    
                                    return {
                                        borderColor: '#ffffff',
                                        backgroundColor: partyInfo.color,
                                        borderWidth: 2,
                                    };
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            type: 'linear',
                            min: -2,
                            title: {
                                display: true,
                                text: 'Gross Domestic Product (in Lakh Crores ₹)',
                                font: { family: 'Outfit', weight: '600', size: 14 },
                                color: '#49454f'
                            },
                            grid: { color: '#e7e0ec', drawBorder: false },
                            ticks: {
                                font: { family: 'Outfit' },
                                color: '#49454f',
                                callback: function(value) {
                                    if (value < 0) return '';
                                    let formattedValue = Number.isInteger(value) ? value : Number(value).toFixed(1);
                                    return '₹' + formattedValue + ' LC';
                                }
                            }
                        },
                        x: {
                            min: '1991', // Set default initial view restriction
                            title: {
                                display: true,
                                text: 'Year',
                                font: { family: 'Outfit', weight: '600', size: 14 },
                                color: '#49454f'
                            },
                            grid: { display: false, drawBorder: false },
                            ticks: {
                                autoSkip: false,
                                maxRotation: 90,
                                minRotation: 90,
                                font: { family: 'Outfit' },
                                color: '#49454f',
                                callback: function(val, index) {
                                    if (index === 0 || index === dataState.years.length - 1 || index % 5 === 0) {
                                        return this.getLabelForValue(val);
                                    }
                                    return null;
                                }
                            }
                        }
                    }
                }
            });

            // Set initial theme colors
            applyChartTheme(window.gdpChartInstance);

            // Connect Filters
            const toggles = [
                { id: 'toggle-india', index: 0, trendIndex: 4 },
                { id: 'toggle-mh', index: 1, trendIndex: 5 },
                { id: 'toggle-tn', index: 2, trendIndex: 6 },
                { id: 'toggle-up', index: 3, trendIndex: 7 }
            ];

            toggles.forEach(toggle => {
                document.getElementById(toggle.id).addEventListener('change', function() {
                    window.gdpChartInstance.setDatasetVisibility(toggle.index, this.checked);
                    window.gdpChartInstance.setDatasetVisibility(toggle.trendIndex, this.checked);
                    window.gdpChartInstance.update();
                });
            });

            // Connect Era Toggle (M3 style toggle logic)
            document.getElementById('toggleEra').addEventListener('click', function() {
                const isFullHistory = currentEra === 1991;
                currentEra = isFullHistory ? 1947 : 1991;
                
                if (isFullHistory) {
                    this.innerText = 'View Since 1991';
                } else {
                    this.innerText = 'View Since 1947';
                }

                // Recalculate trendlines based on new era
                calculateBestFitTrendlines(currentEra);
                
                // Restrict the graph's X-axis start point
                window.gdpChartInstance.options.scales.x.min = String(currentEra);
                window.gdpChartInstance.update();
            });

            // Connect Scale Toggle (M3 style toggle logic)
            document.getElementById('toggleScale').addEventListener('click', function() {
                isLogScale = !isLogScale;
                window.gdpChartInstance.options.scales.y.type = isLogScale ? 'logarithmic' : 'linear';
                window.gdpChartInstance.options.scales.y.min = isLogScale ? 0.01 : -2;
                
                if (isLogScale) {
                    this.innerText = 'Switch to Linear Scale';
                } else {
                    this.innerText = 'Switch to Logarithmic Scale';
                }
                window.gdpChartInstance.update();
            });

            // Trigger async data fetch at the very end
            fetchLiveIndiaData();
        }

        // 5. Async API Fetch Layer
        async function fetchLiveIndiaData() {
            try {
                const response = await fetch('https://api.worldbank.org/v2/country/IN/indicator/NY.GDP.MKTP.CN?format=json&per_page=100');
                const data = await response.json();
                
                if (data && data[1]) {
                    const wbData = data[1];
                    const liveIndiaMap = {};
                    
                    wbData.forEach(item => {
                        if (item.value !== null) {
                            liveIndiaMap[parseInt(item.date)] = item.value / 1000000000000;
                        }
                    });

                    let dataUpdated = false;

                    dataState.years.forEach((yearStr, index) => {
                        const year = parseInt(yearStr);
                        if (liveIndiaMap[year]) {
                            dataState.indiaGdp[index] = parseFloat(liveIndiaMap[year].toFixed(3));
                            
                            // Propagate changes downwards accurately
                            if (year < 2011) {
                                let upShare = 0.08287 + ((2011 - year) * 0.000345);
                                dataState.upGdp[index] = parseFloat((liveIndiaMap[year] * upShare).toFixed(4));
                                
                                let mhShare = 0.1465 - ((2011 - year) * 0.0001);
                                dataState.mhGdp[index] = parseFloat((liveIndiaMap[year] * mhShare).toFixed(4));

                                let tnShare = 0.0860 - ((2011 - year) * 0.0002);
                                dataState.tnGdp[index] = parseFloat((liveIndiaMap[year] * tnShare).toFixed(4));
                            }
                            dataUpdated = true;
                        }
                    });

                    if (dataUpdated) {
                        calculateBestFitTrendlines(currentEra);
                        if(window.gdpChartInstance) window.gdpChartInstance.update();
                        console.log("Successfully synced India & States Historical GDP with live World Bank data.");
                    }
                }
            } catch (error) {
                console.warn("Could not fetch live World Bank data.", error);
            }
        }

        // Kickoff
        initApp();

    </script>
